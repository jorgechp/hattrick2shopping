<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <a href="https://hattrick2shopping.jorgechp.com" target="_blank" id="header-link">
        <img src="logo.webp" alt="Hattrick2Shopping" id="header-logo">
      </a>
    </div>
    <div id="body">
      <label>
        <span id="lblBackendUrl" class="label-text">URL del Backend:</span>
        <input type="url" id="backendUrl" value="https://hattrick2shopping-production.up.railway.app" />
      </label>
      <label>
        <span id="lblBackendPort" class="label-text">Puerto (opcional):</span>
        <input type="number" id="backendPort" placeholder="443" min="1" max="65535" />
      </label>
      <div class="flex gap-2">
        <button id="saveBtn" class="flex-1"></button>
        <button id="resetBtn" class="btn-secondary"></button>
      </div>
      <hr>
      <label class="toggle">
        <input type="checkbox" id="autoCapture" />
        <span id="lblAutoCapture">Captura automática al cargar página</span>
      </label>
      <button id="captureBtn"></button>
      <p id="captureResult"></p>
      <hr>
      <div class="flex items-center gap-2" id="langRow">
        <span id="lblLanguage" class="label-text">Idioma</span>
        <select id="langSelect" class="flex-1">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ca">Català</option>
          <option value="eu">Euskara</option>
          <option value="gl">Galego</option>
          <option value="pt">Português</option>
        </select>
      </div>
      <footer>
        <span id="lblBackend" class="text-xs text-gray-500"></span>
        <span id="status"></span>
        <br>
        <a href="https://hattrick2shopping.jorgechp.com" target="_blank" class="text-xs text-blue-600 no-underline hover:underline">hattrick2shopping.jorgechp.com</a>
      </footer>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
