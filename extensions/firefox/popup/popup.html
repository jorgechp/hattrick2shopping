<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <a href="https://hattrick2shopping.jorgechp.com" target="_blank" id="header-link">
      <img src="logo.webp" alt="Hattrick2Shopping" id="header-logo">
    </a>
    <p>Backend: <span id="status">Verificando...</span></p>
    <hr>
    <label>
      URL del Backend:
      <input type="url" id="backendUrl" value="https://hattrick2shopping-production.up.railway.app" />
    </label>
    <label>
      Puerto (opcional):
      <input type="number" id="backendPort" placeholder="443" min="1" max="65535" />
    </label>
    <div class="flex gap-2">
      <button id="saveBtn" class="flex-1">Guardar</button>
      <button id="resetBtn" class="btn-secondary">Reset</button>
    </div>
    <hr>
    <label class="toggle">
      <input type="checkbox" id="autoCapture" />
      Captura automática al cargar página
    </label>
    <button id="captureBtn">Capturar ahora</button>
    <p id="captureResult"></p>
    <footer>
      <a href="https://hattrick2shopping.jorgechp.com" target="_blank">hattrick2shopping.jorgechp.com</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
